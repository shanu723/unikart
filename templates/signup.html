{% extends "login.html" %}
{% load static %}

{% block content %}
<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow rounded">
        <div class="card-header bg-primary text-white text-center">
          <h4>Sign Up</h4>
        </div>

        <div class="card-body">

          {% if messages %}
          <div class="mt-3">
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
              {{ message }}
              <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
          </div>
          {% endif %}

          <form id="signupForm" method="post" action="{% url 'signup' %}">
            {% csrf_token %}

            <!-- USERNAME -->
            <div class="mb-3">
              <input type="text" id="username" name="username" class="form-control"
                     placeholder="Username" required>
              <small id="usernameError" class="text-danger"></small>
            </div>

            <!-- EMAIL -->
            <div class="mb-3">
              <input type="email" id="email" name="email" class="form-control"
                     placeholder="Email" required>
              <small id="emailError" class="text-danger"></small>
            </div>

            <!-- PASSWORD -->
            <div class="mb-3">
              <input type="password" id="password" name="password" class="form-control"
                     placeholder="Password" required>
              <small id="passwordError" class="text-danger"></small>
            </div>

            <!-- CONFIRM PASSWORD -->
            <div class="mb-3">
              <input type="password" id="confirm_password" name="confirm_password"
                     class="form-control" placeholder="Confirm Password" required>
              <small id="confirmError" class="text-danger"></small>
            </div>

            <button id="submitBtn" type="submit" class="btn btn-primary w-100">
              Sign Up
            </button>

          </form>

        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block script %}
<script>
document.addEventListener("DOMContentLoaded", function () {

    const username = document.getElementById("username");
    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const confirmPassword = document.getElementById("confirm_password");

    const usernameError = document.getElementById("usernameError");
    const emailError = document.getElementById("emailError");
    const passwordError = document.getElementById("passwordError");
    const confirmError = document.getElementById("confirmError");

    const usernamePattern = /^(?=.*[A-Za-z0-9])[A-Za-z0-9_]+$/;


    username.addEventListener("input", function () {

    const value = username.value;

    if (value.length === 0) {
        usernameError.textContent = "Username is required.";
    }
    else if (value.length < 3) {
        usernameError.textContent = "Username must be at least 3 characters.";
    }
    else if (!/^(?=.*[A-Za-z0-9])[A-Za-z0-9_]+$/.test(value)) {
        usernameError.textContent = "Must contain at least one letter or number. Only letters, numbers, underscore allowed.";
    }
    else {
        usernameError.textContent = "";
    }

});


    email.addEventListener("input", function () {
        if (!email.value.includes("@")) {
            emailError.textContent = "Email must contain '@'.";
        } else {
            emailError.textContent = "";
        }
    });
    const passwordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/;
    password.addEventListener("input", function () {

    const value = password.value;

    if (value.length === 0) {
        passwordError.textContent = "Password is required.";
    }
    else if (value.length < 8) {
        passwordError.textContent = "Password must be at least 8 characters.";
    }
    else if (!/(?=.*[a-z])/.test(value)) {
        passwordError.textContent = "Must contain at least one lowercase letter.";
    }
    else if (!/(?=.*[A-Z])/.test(value)) {
        passwordError.textContent = "Must contain at least one uppercase letter.";
    }
    else if (!/(?=.*\d)/.test(value)) {
        passwordError.textContent = "Must contain at least one number.";
    }
    else if (!/(?=.*[@$!%*?&])/.test(value)) {
        passwordError.textContent = "Must contain at least one special character.";
    }
    else {
        passwordError.textContent = "";
    }

});


    confirmPassword.addEventListener("input", function () {

    if (confirmPassword.value.length === 0) {
        confirmError.textContent = "Please confirm your password.";
    }
    else if (password.value !== confirmPassword.value) {
        confirmError.textContent = "Passwords do not match.";
    }
    else {
        confirmError.textContent = "";
    }

});


});
</script>
{% endblock %}
