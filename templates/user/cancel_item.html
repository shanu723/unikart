{% extends "base.html" %}
{% block content %}

<div class="container mt-5">
    <div class="card shadow p-4">

```
    <h4 class="mb-3">Cancel Order #{{ order.id }}</h4>

    <h5 class="mb-2">Item: {{ item.product.name }}</h5>
    <p class="text-muted">Order ID: #{{ item.order.id }}</p>

    <hr>

    <form method="POST">
        {% csrf_token %}

        <!-- Quantity -->
        <div class="mb-3">
            <label class="form-label">Select Quantity to Cancel</label>
            <input type="number"
                   name="cancel_qty"
                   min="1"
                   max="{{ item.quantity }}"
                   class="form-control"
                   placeholder="Enter quantity"
                   required>
        </div>

        <!-- Buttons -->
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger">
                Confirm Cancel
            </button>

            <a href="{% url 'myorders' %}" class="btn btn-secondary">
                Back
            </a>
        </div>

    </form>

</div>
```

</div>

{% endblock %}
