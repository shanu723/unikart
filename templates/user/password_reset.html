{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="auth-wrapper d-flex justify-content-center align-items-center">
  <div class="card shadow-sm p-4" style="max-width: 400px; width: 100%;">
    <div class="card-body">
      <h2 class="card-title text-center mb-3">Forgot your password?</h2>
      <p class="text-center text-muted mb-4">Enter your email to receive reset instructions.</p>

      <form method="POST">
        {% csrf_token %}
        <div class="mb-3">
          {{ form.email.label_tag }}
          {{ form.email }}
          {% if form.email.errors %}
            <div class="text-danger mt-1">{{ form.email.errors }}</div>
          {% endif %}
        </div>
        <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
      </form>

      <div class="mt-3 text-center">
        <a href="{% url 'login' %}" class="text-decoration-none">Back to Login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
