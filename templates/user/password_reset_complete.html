{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="auth-wrapper d-flex justify-content-center align-items-center">
  <div class="card shadow-sm p-4" style="max-width: 400px; width: 100%;">
    <div class="card-body text-center">
      <h2 class="card-title mb-3 text-success">Password Reset Successful!</h2>
      <p class="mb-4">Your password has been updated. You can now 
        <a href="{% url 'login' %}" class="text-decoration-none fw-bold">log in</a>.
      </p>
      <a href="{% url 'login' %}" class="btn btn-primary w-100">Go to Login</a>
    </div>
  </div>
</div>
{% endblock %}
