{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <h2>Change Password</h2>

    {% if success %}
        <div class="alert alert-success">
            Password changed successfully! <a href="{% url 'profile' %}">Go back</a>
        </div>
    {% else %}
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Change Password</button>
        </form>
    {% endif %}
</div>
{% endblock %}
