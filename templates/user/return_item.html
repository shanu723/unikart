{% extends "base.html" %}
{% block content %}
<div class="container mt-5">
    <div class="card p-4">
        <h4 class="mb-3">Return Order #{{ order.id }}</h4>

        <h5 class="mb-3">Return Item: {{ item.product.name }}</h5>
        <p>Order #{{ item.order.id }}</p>

        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label for="reason" class="form-label">Reason for Return</label>
                <textarea name="reason" id="reason" class="form-control" rows="4" required></textarea>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-danger">Confirm Return</button>
                <a href="{% url 'myorders' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
