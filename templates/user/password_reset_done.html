{% extends 'base.html' %}
{% load static %}
{% block content %}
<div class="auth-wrapper d-flex justify-content-center align-items-center">
  <div class="card shadow-sm p-4" style="max-width: 400px; width: 100%;">
    <div class="card-body text-center">
      <h2 class="card-title mb-3">Check Your Email</h2>
      <p class="mb-4">
        We have sent you an email with instructions to reset your password. 
        Please check your inbox and follow the link to continue.
      </p>
      <a href="{% url 'login' %}" class="btn btn-primary w-100">Back to Login</a>
    </div>
  </div>
</div>
{% endblock %}
